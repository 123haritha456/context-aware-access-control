<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Context-Aware Access</title>
<link rel="stylesheet" href="style.css">
<style>
/* Extra dashboard styles */
.info-cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}
.card{
  padding:20px;
  border-radius:15px;
  background:rgba(0,0,0,0.7);
  border:1px solid #0ff;
  box-shadow:0 0 25px #0ff;
  transition:0.3s;
  text-align:center;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 40px #ff0,0 0 60px #0ff;
}
.risk-meter{
  width:150px;
  height:150px;
  margin:30px auto;
  position:relative;
}
.risk-meter svg{transform:rotate(-90deg);}
.risk-meter text{
  fill:#fff;
  font-size:0.6em;
  text-anchor:middle;
  dominant-baseline:middle;
}
</style>
</head>
<body>

<div class="bg-animation"></div>

<div class="center-container">
  <div class="container">
    <h1 class="typing-title">User Dashboard</h1>

    <!-- Risk Meter -->
    <div class="risk-meter">
      <svg viewBox="0 0 36 36">
        <path class="circle-bg" d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831" stroke="#111" stroke-width="3.8" fill="none"/>
        <path class="circle" d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831" stroke="#0ff" stroke-width="3.8" stroke-linecap="round" fill="none" stroke-dasharray="0,100"/>
        <text x="18" y="20" id="riskText">0%</text>
      </svg>
    </div>

    <!-- Info Cards -->
    <div class="info-cards">
      <div class="card">User Identity: <span id="identity"></span></div>
      <div class="card">Device: <span id="device"></span></div>
      <div class="card">Location: <span id="location"></span></div>
      <div class="card">Access Decision: <span id="decision"></span></div>
    </div>
  </div>
</div>

<script>
window.onload=function(){
  if(sessionStorage.getItem("identity")){
    let identity = sessionStorage.getItem("identity");
    let device = sessionStorage.getItem("device");
    let location = sessionStorage.getItem("location");
    let risk = sessionStorage.getItem("risk");
    let decision = sessionStorage.getItem("decision");

    document.getElementById("identity").innerText = identity;
    document.getElementById("device").innerText = device;
    document.getElementById("location").innerText = location;
    document.getElementById("decision").innerText = decision;

    // Animate Risk Meter
    let circle = document.querySelector(".circle");
    let text = document.getElementById("riskText");
    let riskVal = (risk==="Low")?30:(risk==="Medium")?60:100;
    let progress = 0;
    let interval = setInterval(function(){
      if(progress>=riskVal){clearInterval(interval);}
      circle.setAttribute("stroke-dasharray", progress + ",100");
      text.innerText = progress + "%";
      progress++;
    },20);

  } else {
    window.location.href="login.html";
  }
}
</script>

</body>
</html>
